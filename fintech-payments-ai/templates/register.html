{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card">
    <h1 class="card-title">Создание аккаунта</h1>
    <form action="/register" method="post" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" required autocomplete="username" maxlength="50">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" maxlength="100">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">
        <small class="form-hint">Минимум 8 символов, включая заглавную и строчную букву, цифру и спецсимвол (!@#$%^&amp;*)</small>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
    </form>
    <p class="auth-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
  </div>
</div>
{% endblock %}
