{{if .Logs}}
<div class="overflow-auto">
    <table class="striped">
        <thead>
            <tr>
                <th>Time</th>
                <th>Action</th>
                <th>User</th>
                <th>Details</th>
                <th>IP</th>
            </tr>
        </thead>
        <tbody>
            {{range .Logs}}
            <tr>
                <td><small>{{fmtDate .CreatedAt}}</small></td>
                <td><span class="audit-action audit-{{.Action}}">{{.Action}}</span></td>
                <td>{{if .UserID}}#{{.UserID}}{{else}}<span class="muted">—</span>{{end}}</td>
                <td><small>{{if .Details}}{{.Details}}{{else}}<span class="muted">—</span>{{end}}</small></td>
                <td><small class="muted">{{.IPAddress}}</small></td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{else}}
<p class="muted">No audit events recorded yet.</p>
{{end}}
