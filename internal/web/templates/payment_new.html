{{define "content"}}
<div class="payment-form">
    <div id="payment-content">
        <article>
            <header>
                <hgroup>
                    <h2>New Payment</h2>
                    <p>Send funds securely to any registered account</p>
                </hgroup>
            </header>

            <form hx-post="/payments/new" hx-target="#payment-content" hx-swap="innerHTML">
                <input type="hidden" name="_csrf" value="{{.CSRF}}">
                <div class="grid">
                    <label for="amount">
                        Amount
                        <input type="number" id="amount" name="amount" placeholder="0.00"
                               step="0.01" min="0.01" max="1000000" required autofocus>
                    </label>

                    <label for="currency">
                        Currency
                        <select id="currency" name="currency" required>
                            <option value="USD">USD — US Dollar</option>
                            <option value="EUR">EUR — Euro</option>
                            <option value="RUB">RUB — Russian Ruble</option>
                        </select>
                    </label>
                </div>

                <label for="recipient_id">
                    Recipient Account ID
                    <input type="text" id="recipient_id" name="recipient_id"
                           placeholder="RECV12345678" pattern="[A-Z0-9]{8,20}"
                           title="8-20 uppercase letters and digits" required autocomplete="off">
                    <small>8 to 20 uppercase letters and digits (e.g. RECV12345678)</small>
                </label>

                <label for="description">
                    Description <small class="muted">(optional)</small>
                    <textarea id="description" name="description" placeholder="What is this payment for?" maxlength="500" rows="2"></textarea>
                </label>

                <div class="grid">
                    <a href="/payments" role="button" class="secondary outline">Cancel</a>
                    <button type="submit">Send Payment</button>
                </div>
            </form>
        </article>
    </div>
</div>
{{end}}
