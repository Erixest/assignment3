{{define "content"}}
<div class="auth-wrap">
    <article class="auth-form">
        <header>
            <hgroup>
                <h2>Sign In</h2>
                <p>Welcome back to FinPay</p>
            </hgroup>
        </header>

        <form hx-post="/login" hx-target="#login-result" hx-swap="innerHTML">
            <label for="email">
                Email address
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email">
            </label>

            <label for="password">
                Password
                <input type="password" id="password" name="password" placeholder="Your password" required minlength="8" autocomplete="current-password">
            </label>

            <button type="submit">Sign In</button>
        </form>

        <div id="login-result"></div>

        <footer>
            <small>No account yet? <a href="/register">Create one</a></small>
        </footer>
    </article>
</div>
{{end}}
